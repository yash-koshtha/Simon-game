<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seimon Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Simon Game</h1>
    <h2>Press Start To Play The Game</h2>
    <h2 id="highScore"></h2>
    <div class="btn_container">
        <div class="btn_container1">
            <div class="btn red" type="button" id="red">1</div>
            <div class="btn purple" type="button" id="purple">2</div>
        </div>
        <div class="btn_container2">
            <div class="btn aqua" type="button" id="aqua">3</div>
            <div class="btn pink" type="button" id="pink">4</div>
        </div>
    </div><br>
    <button>Start</button>
    <script src="app.js"></script>
</body>

</html>
